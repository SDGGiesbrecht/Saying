name: tvOS

on: [push, pull_request]

jobs:
  tvOS:
    name: tvOS
    runs-on: macos-14
    steps:
    - name: Check out
      uses: actions/checkout@v2
    - name: Set up Xcode
      shell: bash
      run: |
        set -x
        sudo xcode-select -switch /Applications/Xcode_15.0.app
        defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
        xcodebuild -version
        swift --version
    - name: Test
      shell: bash
      run: |
        set -x
        swift run --package-path Scaffolding scaffolding test‐tvos
    - name: Check for warnings
      shell: bash
      run: |
        set -x
        cd .Construction/Swift
        xcrun xcodebuild build -scheme Package -destination 'generic/platform=tvOS' SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
    - name: Check repository for changes
      shell: bash
      run: |
        set -x
        git config --global --add safe.directory '*'
        git add . --intent-to-add
        git diff --exit-code
